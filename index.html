<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />
  <title>Warranty Semantic Hub</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --brand: #002c5f;
      --brand-dark: #001f42;
      --brand-soft: #e8f0fb;
    }

    html,
    body {
      height: 100%;
    }

    body {
      overflow: hidden;
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 999px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    .bg-grid {
      background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
      background-size: 18px 18px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .animate-spin-custom {
      animation: spin 1s linear infinite;
    }

    @keyframes toast-in {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .toast-show {
      animation: toast-in 0.18s ease-out;
    }

    .shadow-soft {
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }
  </style>
</head>
<body class="bg-slate-100 font-sans text-slate-800">
  <div class="flex h-screen flex-col">
    <!-- HEADER -->
    <header class="shrink-0 border-b border-slate-200 bg-[var(--brand)] text-white shadow-sm">
      <div class="mx-auto flex w-full items-center justify-between gap-4 px-4 py-4">
        <div class="flex min-w-0 items-center gap-3">
          <div class="rounded-xl bg-white/10 p-2">
            <svg class="h-6 w-6 text-blue-200" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
            </svg>
          </div>

          <div class="min-w-0">
            <h1 class="truncate text-lg font-bold tracking-wide sm:text-xl">Warranty Semantic Hub</h1>
            <p class="truncate text-xs text-blue-100">
              Hyundai Warranty Policies, Coverage, Claims & Error Workflows
            </p>
          </div>
        </div>

        <div class="flex shrink-0 items-center gap-2 sm:gap-3">
          <div
            id="library-status-pill"
            class="inline-flex items-center gap-2 rounded-full border border-white/20 bg-white/10 px-3 py-1.5 text-xs"
          >
            <span id="library-status-dot" class="h-2 w-2 rounded-full bg-amber-300"></span>
            <span id="library-status-text">Loading libraries…</span>
          </div>

          <div class="hidden items-center gap-2 rounded-full border border-white/20 bg-white/10 px-3 py-1.5 text-xs sm:inline-flex">
            <span class="h-2 w-2 rounded-full bg-green-400"></span>
            <span>Backend secured</span>
          </div>
        </div>
      </div>
    </header>

    <!-- WORKSPACE NAV -->
    <div class="shrink-0 border-b border-slate-200 bg-white px-4 py-3">
      <div class="flex flex-wrap gap-2" id="workspace-nav">
        <button type="button" data-workspace-mode="policy" class="workspace-tab rounded-xl border px-3 py-2 text-sm font-medium transition">Policy</button>
        <button type="button" data-workspace-mode="checklist" class="workspace-tab rounded-xl border px-3 py-2 text-sm font-medium transition">Checklist</button>
        <button type="button" data-workspace-mode="claim_types" class="workspace-tab rounded-xl border px-3 py-2 text-sm font-medium transition">Claim Types</button>
        <button type="button" data-workspace-mode="entry_map" class="workspace-tab rounded-xl border px-3 py-2 text-sm font-medium transition">Entry Map</button>
        <button type="button" data-workspace-mode="validator" class="workspace-tab rounded-xl border px-3 py-2 text-sm font-medium transition">Validator</button>
        <button type="button" data-workspace-mode="error_fix" class="workspace-tab rounded-xl border px-3 py-2 text-sm font-medium transition">Error Fix</button>
        <button type="button" data-workspace-mode="coverage" class="workspace-tab rounded-xl border px-3 py-2 text-sm font-medium transition">Coverage</button>
      </div>
    </div>

    <!-- COMPACT NAV -->
    <div id="mobile-tab-bar" class="border-b border-slate-200 bg-white xl:hidden">
      <div class="grid grid-cols-3 gap-2 px-3 py-3">
        <button
          type="button"
          data-compact-view="left"
          class="compact-tab rounded-xl border border-slate-200 px-3 py-2 text-sm font-medium text-slate-600 transition"
        >
          Navigate
        </button>
        <button
          type="button"
          data-compact-view="center"
          class="compact-tab rounded-xl border border-slate-200 px-3 py-2 text-sm font-medium text-slate-600 transition"
        >
          Details
        </button>
        <button
          type="button"
          data-compact-view="right"
          class="compact-tab rounded-xl border border-slate-200 px-3 py-2 text-sm font-medium text-slate-600 transition"
        >
          Assistant
        </button>
      </div>
    </div>

    <!-- BODY -->
    <main class="flex min-h-0 flex-1 xl:flex-row">
      <!-- LEFT PANEL -->
      <aside
        id="panel-left"
        class="flex min-h-0 flex-1 flex-col bg-white xl:min-w-[320px] xl:w-[28%] xl:border-r xl:border-slate-200"
      >
        <div id="left-panel-header" class="shrink-0 border-b border-slate-200 bg-slate-50 px-4 py-4"></div>
        <div id="leftPanel" class="min-h-0 flex-1 overflow-y-auto p-2"></div>
      </aside>

      <!-- CENTER PANEL -->
      <section
        id="panel-center"
        class="flex min-h-0 flex-1 flex-col bg-slate-50 xl:min-w-[420px] xl:w-[36%] xl:border-r xl:border-slate-200"
      >
        <div id="center-panel-header" class="shrink-0 border-b border-slate-200 bg-white px-4 py-4"></div>
        <div id="centerPanel" class="min-h-0 flex-1 overflow-y-auto"></div>
      </section>

      <!-- RIGHT PANEL -->
      <section
        id="panel-right"
        class="flex min-h-0 flex-1 flex-col bg-white"
      >
        <div id="right-panel-header" class="shrink-0 border-b border-slate-200 bg-white px-4 py-4"></div>
        <div id="rightPanel" class="min-h-0 flex-1 overflow-y-auto"></div>
      </section>
    </main>

    <!-- TOAST -->
    <div
      id="toast"
      class="pointer-events-none fixed bottom-4 left-1/2 z-50 hidden -translate-x-1/2 rounded-full bg-slate-900 px-4 py-2 text-xs font-medium text-white shadow-soft"
    ></div>
  </div>

  <script>
    const APP_MODES = {
      POLICY: "policy",
      CHECKLIST: "checklist",
      CLAIM_TYPES: "claim_types",
      ENTRY_MAP: "entry_map",
      VALIDATOR: "validator",
      ERROR_FIX: "error_fix",
      COVERAGE: "coverage"
    };

    const state = {
      mode: APP_MODES.POLICY,
      compactView: "left",

      manualLoaded: false,
      sending: false,
      loadingLibraries: false,

      searchTerm: "",
      toastTimer: null,

      selectedSectionId: null,
      selectedClaimType: "warranty",
      selectedChecklistGroup: "minimum_submission_checklist",
      selectedPortalSection: "basic_information",
      selectedErrorCode: null,

      policies: [],
      claimRequirements: null,
      claimTypes: [],
      claimPortalSchema: {},
      claimErrorRules: [],
      coverageGuide: null,

      chatHistory: [
        {
          role: "model",
          text: "Hello. I’m your Warranty assistant. I can help with policy, checklist, claim type, portal field, and return-error questions once the libraries finish loading."
        }
      ]
    };

    const MATCH_STOP_WORDS = new Set([
      "a", "an", "the", "about", "tell", "me", "of", "for", "to", "in", "on", "at", "by",
      "show", "what", "is", "are", "was", "were", "be", "being", "been", "give", "example",
      "it", "this", "that", "please", "do", "does", "did", "and", "or", "with", "from",
      "how", "works", "work", "explain", "policy", "warranty", "claim", "claims"
    ]);

    const CHECKLIST_GROUPS = [
      ["repair_order_required_fields", "Repair Order Required Fields"],
      ["repair_order_supporting_requirements", "Repair Order Supporting Requirements"],
      ["digital_attachments_required", "Digital Attachments Required"],
      ["digital_attachment_standards", "Digital Attachment Standards"],
      ["campaign_or_recall_minimums", "Campaign / Recall Minimums"],
      ["audit_support_documents", "Audit Support Documents"],
      ["minimum_submission_checklist", "Minimum Submission Checklist"],
      ["special_requirements", "Special Requirements"]
    ];

    const els = {
      libraryStatusText: document.getElementById("library-status-text"),
      libraryStatusDot: document.getElementById("library-status-dot"),
      toast: document.getElementById("toast"),
      workspaceNav: document.getElementById("workspace-nav"),
      mobileTabBar: document.getElementById("mobile-tab-bar"),
      panelLeft: document.getElementById("panel-left"),
      panelCenter: document.getElementById("panel-center"),
      panelRight: document.getElementById("panel-right"),
      leftPanelHeader: document.getElementById("left-panel-header"),
      centerPanelHeader: document.getElementById("center-panel-header"),
      rightPanelHeader: document.getElementById("right-panel-header"),
      leftPanel: document.getElementById("leftPanel"),
      centerPanel: document.getElementById("centerPanel"),
      rightPanel: document.getElementById("rightPanel")
    };

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function normalizeText(value) {
      return String(value ?? "").trim();
    }

    function normalizeArray(value) {
      if (Array.isArray(value)) return value;
      if (value === null || value === undefined || value === "") return [];
      return [value];
    }

    function normalizeForMatch(value) {
      return String(value ?? "")
        .toLowerCase()
        .replace(/[^a-z0-9\.]+/g, " ")
        .trim();
    }

    function tokenizeForMatch(value) {
      return normalizeForMatch(value)
        .split(" ")
        .map((token) => token.trim())
        .filter((token) => token.length > 1 && !MATCH_STOP_WORDS.has(token));
    }

    function updateLibraryStatus(kind, text) {
      const colorMap = {
        loading: "bg-amber-300",
        ready: "bg-green-400",
        error: "bg-red-400"
      };

      els.libraryStatusDot.className = `h-2 w-2 rounded-full ${colorMap[kind] || "bg-slate-400"}`;
      els.libraryStatusText.textContent = text;
    }

    function showToast(message) {
      if (!message) return;
      if (state.toastTimer) clearTimeout(state.toastTimer);

      els.toast.textContent = message;
      els.toast.classList.remove("hidden");
      els.toast.classList.add("toast-show");

      state.toastTimer = setTimeout(() => {
        els.toast.classList.add("hidden");
        els.toast.classList.remove("toast-show");
      }, 1800);
    }

    async function copyTextToClipboard(text, successMessage = "Copied") {
      const value = normalizeText(text);
      if (!value) return;

      if (navigator.clipboard && window.isSecureContext) {
        try {
          await navigator.clipboard.writeText(value);
          showToast(successMessage);
          return;
        } catch (_) {}
      }

      try {
        const textarea = document.createElement("textarea");
        textarea.value = value;
        textarea.style.position = "fixed";
        textarea.style.top = "-9999px";
        textarea.style.left = "-9999px";
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();
        document.execCommand("copy");
        document.body.removeChild(textarea);
        showToast(successMessage);
      } catch (error) {
        console.error(error);
        showToast("Copy failed");
      }
    }

    async function loadJson(path) {
      const response = await fetch(path, { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`Failed to load ${path} (${response.status})`);
      }
      return response.json();
    }

    async function loadLibraries() {
      state.loadingLibraries = true;
      updateLibraryStatus("loading", "Loading libraries…");
      renderApp();

      try {
        const [
          policies,
          claimRequirements,
          claimTypes,
          claimPortalSchema,
          claimErrorRules,
          coverageGuide
        ] = await Promise.all([
          loadJson("/warranty_library/2026_hyundai_warranty_policies.json"),
          loadJson("/warranty_library/claimRequirements.json"),
          loadJson("/warranty_library/claimTypes.json"),
          loadJson("/warranty_library/claimPortalSchema.json"),
          loadJson("/warranty_library/claimErrorRules.json"),
          loadJson("/warranty_library/coverageGuide.json").catch(() => null)
        ]);

        state.policies = Array.isArray(policies) ? policies : [];
        state.claimRequirements = claimRequirements?.warranty_claim_submission_requirements || null;
        state.claimTypes = claimTypes?.claim_types || [];
        state.claimPortalSchema = claimPortalSchema?.claim_portal_schema || {};
        state.claimErrorRules = claimErrorRules?.claim_error_rules || [];
        state.coverageGuide = coverageGuide || null;

        if (state.claimTypes.length && !state.claimTypes.find((t) => t.key === state.selectedClaimType)) {
          state.selectedClaimType = state.claimTypes[0].key;
        }

        state.manualLoaded = true;
        updateLibraryStatus("ready", "Libraries loaded");
      } catch (error) {
        console.error(error);
        state.manualLoaded = false;
        updateLibraryStatus("error", "Library load failed");
        state.chatHistory.push({
          role: "model",
          text: `⚠️ I could not load one or more JSON libraries. ${error.message}`
        });
      } finally {
        state.loadingLibraries = false;
        renderApp();
      }
    }

    function syncWorkspaceTabs() {
      document.querySelectorAll("[data-workspace-mode]").forEach((button) => {
        const active = button.dataset.workspaceMode === state.mode;
        button.className = `workspace-tab rounded-xl border px-3 py-2 text-sm font-medium transition ${
          active
            ? "border-[var(--brand)] bg-[var(--brand)] text-white shadow-sm"
            : "border-slate-200 bg-white text-slate-700 hover:bg-slate-50"
        }`;
      });
    }

    function setMode(mode) {
      state.mode = mode;
      syncWorkspaceTabs();
      renderApp();

      if (window.innerWidth < 1280) {
        state.compactView = "left";
        updateResponsivePanels();
      }
    }

    function setCompactView(view) {
      state.compactView = view;
      updateResponsivePanels();
    }

    function updateResponsivePanels() {
      const compact = window.innerWidth < 1280;

      if (!compact) {
        els.panelLeft.classList.remove("hidden");
        els.panelLeft.classList.add("flex");
        els.panelCenter.classList.remove("hidden");
        els.panelCenter.classList.add("flex");
        els.panelRight.classList.remove("hidden");
        els.panelRight.classList.add("flex");
        els.mobileTabBar.classList.add("hidden");
        return;
      }

      els.mobileTabBar.classList.remove("hidden");

      const panelMap = {
        left: els.panelLeft,
        center: els.panelCenter,
        right: els.panelRight
      };

      Object.entries(panelMap).forEach(([name, panel]) => {
        const active = state.compactView === name;
        panel.classList.toggle("hidden", !active);
        panel.classList.toggle("flex", active);
      });

      document.querySelectorAll("[data-compact-view]").forEach((button) => {
        const active = button.dataset.compactView === state.compactView;
        button.className = `compact-tab rounded-xl border px-3 py-2 text-sm font-medium transition ${
          active
            ? "border-[var(--brand)] bg-[var(--brand)] text-white shadow-sm"
            : "border-slate-200 bg-white text-slate-600 hover:bg-slate-50"
        }`;
      });
    }

    function formatInlineMarkdown(text) {
      return text.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
    }

    function sectionExists(sectionId) {
      return state.policies.some((sec) => String(sec.section_id) === String(sectionId));
    }

    function getSectionById(sectionId) {
      return state.policies.find((sec) => String(sec.section_id) === String(sectionId)) || null;
    }

    function linkSectionMentions(text) {
      return text.replace(
        /\b(?:Section|Sec\.?)\s+([1-9]\d*(?:\.\d+)*)\b/gi,
        (match, sectionId) => {
          if (!sectionExists(sectionId)) return match;
          return `
            <button
              type="button"
              data-select-section="${escapeHtml(sectionId)}"
              class="inline-flex items-center rounded-md border border-blue-200 bg-blue-50 px-1.5 py-0.5 text-xs font-semibold text-[var(--brand)] transition hover:bg-blue-100"
            >
              Section ${escapeHtml(sectionId)}
            </button>
          `;
        }
      );
    }

    function formatRichInline(text, role = "model") {
      let html = escapeHtml(text);
      html = formatInlineMarkdown(html);
      if (role === "model") {
        html = linkSectionMentions(html);
      }
      return html;
    }

    function renderMessageBody(text, role = "model") {
      const lines = String(text ?? "").split("\n");
      let html = "";
      let inList = false;
      let listType = "";

      for (const rawLine of lines) {
        const line = rawLine.trim();

        if (!line) {
          if (inList) {
            html += `</${listType}>`;
            inList = false;
          }
          html += "<br>";
          continue;
        }

        const isBullet = /^[-*]\s+(.*)/.exec(line);
        const isNum = /^(\d+)\.\s+(.*)/.exec(line);

        if (isBullet) {
          if (!inList) {
            html += `<ul class="list-disc space-y-1 pl-5 mb-2 text-slate-700">`;
            inList = true;
            listType = "ul";
          } else if (listType === "ol") {
            html += `</ol><ul class="list-disc space-y-1 pl-5 mb-2 text-slate-700">`;
            listType = "ul";
          }
          html += `<li>${formatRichInline(isBullet[1], role)}</li>`;
        } else if (isNum) {
          if (!inList) {
            html += `<ol class="list-decimal space-y-1 pl-5 mb-2 text-slate-700">`;
            inList = true;
            listType = "ol";
          } else if (listType === "ul") {
            html += `</ul><ol class="list-decimal space-y-1 pl-5 mb-2 text-slate-700">`;
            listType = "ol";
          }
          html += `<li>${formatRichInline(isNum[2], role)}</li>`;
        } else {
          if (inList) {
            html += `</${listType}>`;
            inList = false;
          }
          html += `<p class="mb-2 text-slate-700">${formatRichInline(line, role)}</p>`;
        }
      }

      if (inList) html += `</${listType}>`;
      return html;
    }

    function scoreSectionMatch(sec, question) {
      const qNorm = normalizeForMatch(question);
      const qTokens = tokenizeForMatch(question);

      if (!qNorm) return 0;

      const number = normalizeForMatch(sec.section_id);
      const title = normalizeForMatch(sec.title);
      const content = normalizeForMatch(sec.raw_content);

      let score = 0;

      const isDirectLookup =
        (number && qNorm === number) ||
        (number && qNorm === `section ${number}`) ||
        qTokens.includes(number);

      if (isDirectLookup) score += 300;
      if (title && qNorm === title) score += 180;
      if (title && title.includes(qNorm) && qNorm.length >= 3) score += 120;

      let tokenHits = 0;

      for (const token of qTokens) {
        let matched = false;

        if (number === token) {
          score += 150;
          matched = true;
        } else if (number.includes(token)) {
          score += 45;
          matched = true;
        }

        if (title === token) {
          score += 100;
          matched = true;
        } else if (title.includes(token)) {
          score += 24;
          matched = true;
        }

        if (content.includes(token)) {
          score += 5;
          matched = true;
        }

        if (matched) tokenHits += 1;
      }

      if (qTokens.length > 0) {
        score += tokenHits * 8;
        if (tokenHits === qTokens.length) score += 30;
      }

      return score;
    }

    function findMatchingSections(question) {
      const ranked = state.policies
        .map((sec) => ({ sec, score: scoreSectionMatch(sec, question) }))
        .filter((item) => item.score >= 20)
        .sort((a, b) => b.score - a.score);

      if (!ranked.length) return [];

      const topScore = ranked[0].score;
      const secondScore = ranked[1]?.score ?? 0;

      if (topScore >= 60 && topScore - secondScore >= 35) {
        return [ranked[0].sec];
      }

      const floor = Math.max(20, Math.floor(topScore * 0.55));
      return ranked
        .filter((item, index) => index < 6 && item.score >= floor)
        .map((item) => item.sec);
    }

    function getSelectedSection() {
      return getSectionById(state.selectedSectionId);
    }

    function getSelectedClaimType() {
      return state.claimTypes.find((t) => t.key === state.selectedClaimType) || null;
    }

    function getSelectedPortalSchema() {
      return state.claimPortalSchema?.[state.selectedClaimType] || null;
    }

    function getSelectedErrorRule() {
      return state.claimErrorRules.find((r) => r.code === state.selectedErrorCode) || null;
    }

    function getPromptSuggestions() {
      switch (state.mode) {
        case APP_MODES.CHECKLIST:
          return [
            "What documents are required before submission?",
            "What attachments are mandatory?",
            "What do I need for a powertrain claim?",
            "What records must be retained for audit?"
          ];
        case APP_MODES.CLAIM_TYPES:
          return [
            "What claim type should I use for rental?",
            "What is the difference between warranty and campaign?",
            "When do I use a PDI claim?",
            "What workflows are related to warranty claims?"
          ];
        case APP_MODES.ENTRY_MAP:
          return [
            "Explain the Basic Information section",
            "What belongs in OP Code Information?",
            "How should attachments be categorized?",
            "What does the summary section mean?"
          ];
        case APP_MODES.ERROR_FIX:
          return [
            "Explain code 306",
            "What does invalid OP code mean?",
            "How do I fix a returned claim?",
            "When is dealer reply needed?"
          ];
        case APP_MODES.COVERAGE:
          return [
            "What is covered for this component?",
            "What are the time and mileage limits?",
            "Is this covered for second owner?",
            "What exclusions apply?"
          ];
        case APP_MODES.POLICY:
        default:
          if (getSelectedSection()) {
            return [
              "Summarize this policy",
              "What are the time or mileage limits?",
              "What is specifically excluded?",
              "What actions must the dealer take?"
            ];
          }
          return [
            "How do I file a transportation claim?",
            "What is the warranty on a 12V battery?",
            "Explain the Pre-Delivery Inspection rules",
            "What are the exclusions for paint defects?"
          ];
      }
    }

    function renderPromptChips(containerId = "chat-prompts-inline") {
      const prompts = getPromptSuggestions();
      return `
        <div id="${containerId}" class="mt-3 flex flex-wrap gap-2">
          ${prompts.map((prompt) => `
            <button
              type="button"
              data-prompt="${escapeHtml(prompt)}"
              class="rounded-full border border-slate-200 bg-white px-3 py-1.5 text-xs font-medium text-slate-600 transition hover:border-slate-300 hover:bg-slate-50"
            >
              ${escapeHtml(prompt)}
            </button>
          `).join("")}
        </div>
      `;

          <h2 class="text-sm font-semibold text-slate-700">Error Details</h2>
        </div>
      `;

      if (!selectedRule) {
        els.centerPanel.innerHTML = `<div class="p-5">${renderPlaceholderCard("No error rules", "claimErrorRules.json is missing or no rules match the selected claim type.")}</div>`;
      } else {
        els.centerPanel.innerHTML = `
          <div class="space-y-4 p-5">
            <div class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
              <div class="flex flex-wrap items-center gap-2">
                <span class="rounded-full bg-blue-100 px-2.5 py-1 text-[11px] font-bold uppercase tracking-wide text-[var(--brand)]">${escapeHtml(selectedRule.code)}</span>
                <span class="rounded-full bg-slate-100 px-2.5 py-1 text-[11px] font-medium text-slate-600">${escapeHtml(selectedRule.severity || "info")}</span>
                <span class="rounded-full bg-slate-100 px-2.5 py-1 text-[11px] font-medium text-slate-600">${escapeHtml(selectedRule.category || "general")}</span>
              </div>

              <h2 class="mt-3 text-xl font-bold text-slate-900">${escapeHtml(selectedRule.message)}</h2>
              <p class="mt-3 text-sm text-slate-600">${escapeHtml(selectedRule.meaning || "")}</p>
            </div>

            <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
              <div class="text-sm font-semibold text-slate-900">Likely Problem Areas</div>
              <ul class="mt-3 space-y-2 text-sm text-slate-700">
                ${(selectedRule.likely_problem_areas || []).map((item) => `<li>${escapeHtml(item)}</li>`).join("")}
              </ul>
            </div>

            <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
              <div class="text-sm font-semibold text-slate-900">Validation Checks</div>
              <ul class="mt-3 space-y-2 text-sm text-slate-700">
                ${(selectedRule.validation_checks || []).map((item) => `<li>${escapeHtml(item)}</li>`).join("")}
              </ul>
            </div>

            <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
              <div class="text-sm font-semibold text-slate-900">Recommended Fix Steps</div>
              <ol class="mt-3 list-decimal space-y-2 pl-5 text-sm text-slate-700">
                ${(selectedRule.recommended_fix_steps || []).map((item) => `<li>${escapeHtml(item)}</li>`).join("")}
              </ol>
            </div>
          </div>
        `;
      }

      els.rightPanelHeader.innerHTML = `
        <div class="flex items-center justify-between gap-3">
          <h2 class="text-sm font-semibold text-slate-700">Return Guidance</h2>
        </div>
      `;

      els.rightPanel.innerHTML = selectedRule
        ? `
          <div class="space-y-4 p-4">
            <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
              <div class="text-sm text-slate-500">Screen</div>
              <div class="mt-1 text-sm font-semibold text-slate-900">${escapeHtml(selectedRule.screen || "-")}</div>
            </div>
            <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
              <div class="text-sm text-slate-500">Dealer Reply Needed</div>
              <div class="mt-1 text-sm font-semibold text-slate-900">${selectedRule.dealer_reply_needed ? "Yes" : "No"}</div>
            </div>
            <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
              <div class="text-sm font-semibold text-slate-900">How to use this</div>
              <p class="mt-2 text-sm text-slate-600">
                Use this view when a claim returns, an OP code triggers a validation error, or the portal shows a warning tied to the current claim type.
              </p>
            </div>
          </div>
        `
        : `<div class="p-5">${renderPlaceholderCard("No rule selected", "Select an error rule on the left.")}</div>`;

      const errorClaimTypeSelect = document.getElementById("error-claim-type-select");
      if (errorClaimTypeSelect) {
        errorClaimTypeSelect.addEventListener("change", (event) => {
          state.selectedClaimType = event.target.value;
          state.selectedErrorCode = null;
          renderErrorFixMode();
          renderChatPanel();
        });
      }

      els.leftPanel.querySelectorAll("[data-error-code]").forEach((button) => {
        button.addEventListener("click", () => {
          state.selectedErrorCode = button.dataset.errorCode;
          renderErrorFixMode();
          renderChatPanel();
          if (window.innerWidth < 1280) setCompactView("center");
        });
      });
    }

    function renderCoverageMode() {
      els.leftPanelHeader.innerHTML = `
        <div class="mb-3 flex items-center justify-between gap-3">
          <h2 class="text-sm font-semibold text-slate-700">Coverage Guide</h2>
        </div>
        <p class="text-xs text-slate-500">CoverageGuide.json can plug in here when structured.</p>
      `;

      els.leftPanel.innerHTML = `
        <div class="rounded-xl border border-dashed border-slate-200 bg-slate-50 p-4 text-sm text-slate-500">
          Build this mode after you structure the Coverage Guide into coverageGuide.json categories.
        </div>
      `;

      els.centerPanelHeader.innerHTML = `
        <div class="flex items-center justify-between gap-3">
          <h2 class="text-sm font-semibold text-slate-700">Coverage Lookup</h2>
        </div>
      `;

      els.centerPanel.innerHTML = `
        <div class="p-5">
          ${renderPlaceholderCard("Coverage mode ready for next phase", "Use this mode for component coverage, time/mileage limits, ownership rules, and exceptions once coverageGuide.json is structured.")}
        </div>
      `;

      els.rightPanelHeader.innerHTML = `
        <div class="flex items-center justify-between gap-3">
          <h2 class="text-sm font-semibold text-slate-700">Coverage Notes</h2>
        </div>
      `;

      els.rightPanel.innerHTML = `
        <div class="p-4">
          <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
            <div class="text-sm font-semibold text-slate-900">Planned use</div>
            <p class="mt-2 text-sm text-slate-600">
              This mode should answer: What is covered, for how long, for which owner, and under what exception?
            </p>
          </div>
        </div>
      `;
    }

    function renderApp() {
      syncWorkspaceTabs();

      switch (state.mode) {
        case APP_MODES.CHECKLIST:
          renderChecklistMode();
          break;
        case APP_MODES.CLAIM_TYPES:
          renderClaimTypesMode();
          break;
        case APP_MODES.ENTRY_MAP:
          renderEntryMapMode();
          break;
        case APP_MODES.VALIDATOR:
          renderValidatorMode();
          break;
        case APP_MODES.ERROR_FIX:
          renderErrorFixMode();
          break;
        case APP_MODES.COVERAGE:
          renderCoverageMode();
          break;
        case APP_MODES.POLICY:
        default:
          renderPolicyMode();
          break;
      }

      renderChatPanel();
      updateResponsivePanels();
    }

    async function sendMessage() {
      const chatInput = document.getElementById("chat-input");
      const message = normalizeText(chatInput?.value);

      if (!message || !state.manualLoaded || state.sending) return;

      state.chatHistory.push({ role: "user", text: message });
      if (chatInput) chatInput.value = "";
      state.sending = true;

      if (window.innerWidth < 1280) {
        setCompactView("right");
      }

      renderChatPanel();

      try {
        const selectedSection = state.mode === APP_MODES.POLICY ? getSelectedSection() : null;
        const matchedSections = state.mode === APP_MODES.POLICY ? findMatchingSections(message) : [];

        const response = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "content-type": "application/json"
          },
          body: JSON.stringify({
            message,
            mode: state.mode,
            selectedSection,
            relevantSections: matchedSections,
            selectedClaimType: state.selectedClaimType,
            selectedChecklistGroup: state.selectedChecklistGroup,
            selectedPortalSection: state.selectedPortalSection,
            selectedErrorCode: state.selectedErrorCode,
            history: state.chatHistory.slice(-8)
          })
        });

        const data = await response.json().catch(() => ({}));

        if (!response.ok) {
          throw new Error(data?.error || `Request failed with status ${response.status}`);
        }

        const answer = normalizeText(data.answer) || "I’m sorry, I could not generate a response.";
        state.chatHistory.push({ role: "model", text: answer });
      } catch (error) {
        console.error(error);
        state.chatHistory.push({
          role: "model",
          text: `⚠️ Sorry, I hit an error while checking the loaded libraries. ${error.message}`
        });
      } finally {
        state.sending = false;
        renderChatPanel();
        const nextInput = document.getElementById("chat-input");
        if (nextInput) nextInput.focus();
      }
    }

    function usePrompt(prompt) {
      const text = normalizeText(prompt);
      if (!text) return;
      const chatInput = document.getElementById("chat-input");
      if (chatInput) chatInput.value = text;
      if (window.innerWidth < 1280) setCompactView("right");
      sendMessage();
    }

    function clearChat() {
      state.chatHistory = [
        {
          role: "model",
          text: state.manualLoaded
            ? "Chat cleared. Ask me about policy, checklist, claim types, portal sections, or returned-claim errors."
            : "Chat cleared. I’ll be ready once the libraries finish loading."
        }
      ];
      renderChatPanel();
    }

    function bindGlobalEvents() {
      document.addEventListener("click", (event) => {
        const workspaceBtn = event.target.closest("[data-workspace-mode]");
        if (workspaceBtn) {
          setMode(workspaceBtn.dataset.workspaceMode);
          return;
        }

        const compactTab = event.target.closest("[data-compact-view]");
        if (compactTab) {
          setCompactView(compactTab.dataset.compactView);
          return;
        }

        const sectionLink = event.target.closest("[data-select-section]");
        if (sectionLink) {
          state.mode = APP_MODES.POLICY;
          state.selectedSectionId = sectionLink.dataset.selectSection;
          renderApp();
          if (window.innerWidth < 1280) setCompactView("center");
          return;
        }

        const promptButton = event.target.closest("[data-prompt]");
        if (promptButton) {
          usePrompt(promptButton.dataset.prompt);
          return;
        }

        const copyChatButton = event.target.closest("[data-copy-chat-index]");
        if (copyChatButton) {
          const index = Number(copyChatButton.dataset.copyChatIndex);
          const item = state.chatHistory[index];
          if (item?.text) {
            copyTextToClipboard(item.text, "Response copied");
          }
          return;
        }

        const copySectionButton = event.target.closest("[data-copy-section]");
        if (copySectionButton) {
          copyTextToClipboard(copySectionButton.dataset.copySection, "Copied");
          return;
        }
      });

      document.addEventListener("keydown", (event) => {
        if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === "k") {
          event.preventDefault();
          if (state.mode === APP_MODES.POLICY) {
            const input = document.getElementById("policy-search-input");
            if (window.innerWidth < 1280) setCompactView("left");
            if (input) input.focus();
          }
        }
      });

      window.addEventListener("resize", updateResponsivePanels);
    }

    function init() {
      bindGlobalEvents();
      updateResponsivePanels();
      renderApp();
      loadLibraries();
    }

    init();
  </script>
</body>
</html>
